[files]
extend-exclude = [
  # Exploration capture files are verbatim, append-only human dumps
  # (explorations/README.md conventions) — never spell-gated.
  "explorations/*/CAPTURE.md",
  "bun.lock",
  "*.snap",
  ".repos/**",
  "node_modules/**",
  "build/**",
  "tmp/**",
  "dist/**",
  "coverage/**",
  ".next/**",
  "**/storybook-static/**",
  ".beep/**",
  "scratchpad/**",
  "explorations/**",
  "outputs/agent-reliability/**",
  "goals/**",
  "standards/repo-exports.catalog.jsonc",
  "standards/repo-exports.catalog.md",
  "**/internal/data/**",
  "**/src-tauri/gen/**",
  "**/src-tauri/target/**",
  "packages/drivers/venice-ai/swagger.yaml",
  # Vendored, version-pinned WHATWG/webref spec data for @beep/html (see data/SOURCES.md).
  "packages/foundation/modeling/html/data/**",
]
