# OSV Scanner configuration shared by the GitHub security workflow and local
# repo sanity checks.
#
# Keep this file present even when there are no accepted vulnerability ignores:
# the workflow passes it explicitly with `--config=osv-scanner.toml`, and the
# local Bun audit wrapper mirrors ignored vulnerability ids found here.
#
# Add ignored vulnerabilities only after review, with a reason and expiry date.
# The `ignoreUntil` expiry is enforced by both consumers: OSV Scanner honors it
# natively, and the local Bun audit wrapper (runBunAudit in
# packages/tooling/tool/cli/src/commands/Quality/Quality.command.ts) only
# mirrors an `--ignore` for entries whose `ignoreUntil` is still in the future,
# so expired entries stop suppressing the advisory automatically.

[[IgnoredVulns]]
id = "GHSA-h67p-54hq-rp68"
ignoreUntil = 2026-09-13T00:00:00Z
reason = "js-yaml advisory affecting 3.14.2 and 4.1.1; fixed in 4.2.0. js-yaml is a transitive dependency (the 3.14.2 line is pulled by a legacy dependent that has not adopted the 4.x major). Newly published advisory, not introduced by the current PR (identical versions present on main); tracked for a repo-wide bump to >=4.2.0. Revisit when dependents widen their ranges."

[[IgnoredVulns]]
