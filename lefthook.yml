pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css,md}"
      run: bunx biome check --write {staged_files}
      stage_fixed: true
    jsdoc:
      glob: "tooling/*/src/**/*.ts"
      exclude: "tooling/*/src/internal/**|tooling/_test-*/src/**|**/*.test.ts|**/*.spec.ts|**/*.d.ts"
      run: npx eslint --config eslint.config.mjs --ignore-pattern 'tooling/_test-*/**' {staged_files}

pre-push:
  parallel: true
  commands:
    typecheck:
      run: npx turbo build && tsc -p tsconfig.json --noEmit
    test:
      run: npx vitest run

post-merge:
  commands:
    version-sync-check:
      run: bun run beep version-sync --skip-network
