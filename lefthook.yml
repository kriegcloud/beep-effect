pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css}"
      exclude: ".beep/**|goals/**|outputs/**|scratchpad/**"
      run: bunx biome check --write --files-ignore-unknown=true --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    jsdoc:
      glob: "packages/tooling/*/*/src/**/*.ts"
      exclude: "packages/tooling/*/*/src/internal/**|**/*.test.ts|**/*.spec.ts|**/*.d.ts"
      run: bunx eslint --no-warn-ignored --config eslint.config.mjs {staged_files}
    gitleaks:
      run: gitleaks protect --staged --verbose --config .gitleaks.toml
    typos:
      glob: "*.{ts,tsx,js,jsx,md,json}"
      exclude: ".beep/**|goals/**|outputs/**|scratchpad/**"
      run: typos --exclude '.beep/**' --exclude 'scratchpad/**'

commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}

post-merge:
  commands:
    version-sync-check:
      run: bun run beep version-sync --skip-network
