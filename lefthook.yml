pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,json,jsonc,css}"
      exclude: ".beep/**"
      run: bunx biome check --write {staged_files}
      stage_fixed: true
    jsdoc:
      glob: "tooling/*/src/**/*.ts"
      exclude: "tooling/*/src/internal/**|tooling/_test-*/src/**|**/*.test.ts|**/*.spec.ts|**/*.d.ts"
      run: npx eslint --config eslint.config.mjs --ignore-pattern 'tooling/_test-*/**' {staged_files}
    gitleaks:
      run: gitleaks protect --staged --verbose
    typos:
      glob: "*.{ts,tsx,js,jsx,md,json}"
      exclude: ".beep/**"
      run: typos {staged_files}

commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit {1}

pre-push:
  commands:
    beep-sync-gates:
      run: bun run beep-sync:gates
    quality:
      run: bun run build && bun run check && bun run test

post-merge:
  commands:
    version-sync-check:
      run: bun run beep version-sync --skip-network
