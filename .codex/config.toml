# Repository-local Codex configuration for beep-effect.
#
# Claude remains the source of truth for the skill bodies in `.claude/skills`.
# Codex discovers the mirrored repo skill root through `.agents/skills`, which is
# linked to that Claude tree.
[features]
  # The ChatGPT app/connectors MCP is useful for ad-hoc GitHub work, but it makes
  # every repo session depend on chatgpt.com apps startup. Keep this checkout quiet
  # and opt in per invocation with `codex --enable apps` when connector tools matter.
  apps = false

[skills]
  include_instructions = true
  [[skills.config]]
    name = "atom-reactivity-specialist"
    enabled = true
  [[skills.config]]
    name = "claude-frontend-lane"
    enabled = true
  [[skills.config]]
    name = "effect-first-development"
    enabled = true
  [[skills.config]]
    name = "effect-services"
    enabled = true
  [[skills.config]]
    name = "effect-v4-imports"
    enabled = true
  [[skills.config]]
    name = "explore"
    enabled = true
  [[skills.config]]
    name = "grill-me"
    enabled = true
  [[skills.config]]
    name = "grill-with-docs"
    enabled = true
  [[skills.config]]
    name = "jsdoc-annotation-specialist"
    enabled = true
  [[skills.config]]
    name = "mcp-graphiti-memory"
    enabled = true
  [[skills.config]]
    name = "mcp-jetbrains"
    enabled = true
  [[skills.config]]
    name = "onepassword-secret-refs"
    enabled = true
  [[skills.config]]
    name = "ponytail"
    enabled = true
  [[skills.config]]
    name = "ponytail-audit"
    enabled = true
  [[skills.config]]
    name = "ponytail-debt"
    enabled = true
  [[skills.config]]
    name = "ponytail-gain"
    enabled = true
  [[skills.config]]
    name = "ponytail-help"
    enabled = true
  [[skills.config]]
    name = "ponytail-review"
    enabled = true
  [[skills.config]]
    name = "portless"
    enabled = true
  [[skills.config]]
    name = "quality-review-fix-loop"
    enabled = true
  [[skills.config]]
    name = "reflect"
    enabled = true
  [[skills.config]]
    name = "repo-symbol-discovery"
    enabled = true
  [[skills.config]]
    name = "schema-first-development"
    enabled = true
  [[skills.config]]
    name = "schema-model-specialist"
    enabled = true
  [[skills.config]]
    name = "shadcn"
    enabled = true
  [[skills.config]]
