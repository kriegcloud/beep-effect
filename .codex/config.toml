# Repository-local Codex configuration for beep-effect.
#
# Claude remains the source of truth for the skill bodies in `.claude/skills`.
# Codex discovers the mirrored repo skill root through `.agents/skills`, which is
# linked to that Claude tree.

[features]
# The ChatGPT app/connectors MCP is useful for ad-hoc GitHub work, but it makes
# every repo session depend on chatgpt.com apps startup. Keep this checkout quiet
# and opt in per invocation with `codex --enable apps` when connector tools matter.
apps = false

[mcp_servers.shadcn]
# Pin the MCP server package instead of executing mutable npx latest.
command = "npx"
args = ["-y", "shadcn@4.7.0", "mcp"]
# npx can spend a few seconds revalidating the cache before the MCP handshake.
startup_timeout_sec = 90

[mcp_servers.next-devtools]
# This is inherited from the user-global config but is only needed for active
# Next.js debugging. Keeping it disabled here avoids npm/network work on startup.
enabled = false

[mcp_servers.serena]
command = "serena"
args = [
  "start-mcp-server",
  "--context", "codex",
  "--language-backend", "JetBrains",
  "--project-from-cwd"
]

[skills]
include_instructions = true

