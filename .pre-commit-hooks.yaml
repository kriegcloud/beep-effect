- id: ai-rulez-validate
  name: Validate AI rulez configuration
  description: Validate ai-rulez configuration files and ensure they would generate successfully
  entry: scripts/pre-commit/run-ai-rulez.sh
  args:
    - generate
    - --dry-run
  language: script
  files: '\.(ai-rulez|ai_rulez)\.(yaml|yml)$|^\.ai-rulez\.(yaml|yml)$|^ai-rulez\.(yaml|yml)$'
  pass_filenames: false
  always_run: false
  require_serial: false

- id: ai-rulez-generate
  name: Generate AI assistant configuration files
  description: Generate AI assistant configuration files from ai-rulez configuration
  entry: scripts/pre-commit/run-ai-rulez.sh
  args:
    - generate
  language: script
  files: '\.(ai-rulez|ai_rulez)\.(yaml|yml)$|^\.ai-rulez\.(yaml|yml)$|^ai-rulez\.(yaml|yml)$'
  pass_filenames: false
  always_run: false
  require_serial: false

- id: ai-rulez-recursive
  name: Generate AI assistant files (recursive)
  description: Generate all ai-rulez output files in the repository recursively
  entry: scripts/pre-commit/run-ai-rulez.sh
  args:
    - generate
    - --recursive
  language: script
  files: '\.(ai-rulez|ai_rulez)\.(yaml|yml)$|^\.ai-rulez\.(yaml|yml)$|^ai-rulez\.(yaml|yml)$'
  pass_filenames: false
  always_run: false
  require_serial: false

- id: ai-rulez-enforce
  name: AI-Rulez rule enforcement
  description: Enforce coding standards using AI agents
  entry: scripts/pre-commit/run-ai-rulez.sh
  language: script
  args:
    - enforce
    - --level
    - error
  files: '\.(js|ts|jsx|tsx|py|go|java|c|cpp|rs|php)$'
  pass_filenames: false
  always_run: false
  require_serial: false

- id: ai-rulez-enforce-fix
  name: AI-Rulez enforcement with auto-fix
  description: Enforce coding standards and automatically apply fixes using AI agents
  entry: scripts/pre-commit/run-ai-rulez.sh
  language: script
  args:
    - enforce
    - --fix
    - --level
    - error
  files: '\.(js|ts|jsx|tsx|py|go|java|c|cpp|rs|php)$'
  pass_filenames: false
  always_run: false
  require_serial: false
