version: 2

project_name: ai-rulez

before:
  hooks:
    - go mod download

builds:
  - id: ai-rulez
    binary: ai-rulez
    main: ./cmd
    env:
      - CGO_ENABLED=0
      - GOPROXY=direct
      - GOSUMDB=off
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - "386"
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: 'checksums.txt'

release:
  github:
    owner: Goldziher
    name: ai-rulez
  skip_upload: false
  replace_existing_draft: true


brews:
  - name: ai-rulez
    description: "⚡ Lightning-fast CLI tool (written in Go) for managing AI assistant rules"
    homepage: "https://github.com/Goldziher/ai-rulez"
    license: "MIT"
    repository:
      owner: Goldziher
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
      branch: main
    directory: Formula
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    skip_upload: false