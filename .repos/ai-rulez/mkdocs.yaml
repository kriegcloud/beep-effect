site_name: ai-rulez
site_description: Lightning-fast CLI tool and MCP server for managing AI assistant rules
site_url: https://ai-rulez.dev
site_author: Na'aman Hirschfeld
repo_name: Goldziher/ai-rulez
repo_url: https://github.com/Goldziher/ai-rulez
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2025 Na'aman Hirschfeld

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables

plugins:
  - search
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      enable_git_follow: false
      strict: false

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Goldziher/ai-rulez
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/package/ai-rulez
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/ai-rulez/

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quick-start.md
  - Configuration: configuration.md
  - Monorepo Guide: monorepo.md
  - CLI Commands: cli.md
  - MCP Server: mcp-server.md
  - Schema: schema.md
  - Examples: examples.md