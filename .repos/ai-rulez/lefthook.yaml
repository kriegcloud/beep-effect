pre-commit:
  parallel: true
  commands:
    lint:
      run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.9.0 run --fix
      fail_text: "Go linting failed"
    fmt:
      run: go fmt ./...
      fail_text: "Go formatting failed"
    mod-tidy:
      run: go mod tidy
      fail_text: "go mod tidy failed"

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}
      fail_text: "Commit message does not follow conventional commits format"
