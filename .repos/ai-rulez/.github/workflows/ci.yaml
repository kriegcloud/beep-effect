name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Install Task
        uses: arduino/setup-task@v2
        if: steps.task-cache.outputs.cache-hit != 'true'
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.9.0
          args: --timeout=5m

  test:
    name: Test - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Install Task
        uses: arduino/setup-task@v2
        if: steps.task-cache.outputs.cache-hit != 'true'
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run all tests (unit + platform)
        run: task test

      - name: Run cross-platform specific tests
        run: task test:platform

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-${{ matrix.os }}
          path: |
            coverage.out
            *.log
          retention-days: 7


  e2e-test:
    name: E2E Tests - ${{ matrix.os }} - ${{ matrix.test-suite }}
    runs-on: ${{ matrix.os }}
    needs: [lint, test]
    timeout-minutes: 15
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        test-suite: [cli, mcp, integration]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Install Task
        uses: arduino/setup-task@v2
        if: steps.task-cache.outputs.cache-hit != 'true'
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build binary for tests
        run: task build

      - name: Run e2e tests - ${{ matrix.test-suite }}
        run: |
          echo "::group::E2E Tests - ${{ matrix.test-suite }}"
          task test:e2e:${{ matrix.test-suite }}
          echo "::endgroup::"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: e2e-results-${{ matrix.os }}-${{ matrix.test-suite }}
          path: testing/e2e/*.log
          retention-days: 7

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Install Task
        uses: arduino/setup-task@v2
        if: steps.task-cache.outputs.cache-hit != 'true'
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build binary for benchmarks
        run: task build

      - name: Run benchmarks
        run: task test:benchmark | tee benchmark-results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-results
          path: benchmark-results.txt
          retention-days: 30

  comprehensive-test:
    name: Comprehensive Test Suite - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [lint]
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Install Task
        uses: arduino/setup-task@v2
        if: steps.task-cache.outputs.cache-hit != 'true'
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build binary for tests
        run: task build

      - name: Run all test suites (unit + platform + e2e)
        run: task test:all

      - name: Upload comprehensive test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: comprehensive-test-results-${{ matrix.os }}
          path: |
            coverage.out
            testing/e2e/*.log
            *.log
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, e2e-test, comprehensive-test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install dependencies
        run: go mod download

      - name: Install Task
        uses: arduino/setup-task@v2
        if: steps.task-cache.outputs.cache-hit != 'true'
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build binary
        run: task build

      - name: Build for multiple platforms
        run: task build:all

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: binaries
          path: bin/
