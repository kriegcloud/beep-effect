metadata:
  name: MCP Servers Migration Test
  description: Test project with MCP servers to migrate
presets:
  - claude
outputs:
  - path: CLAUDE.md
rules:
  - name: MCP Test Rule
    content: This is a test rule for MCP migration.
    priority: medium
mcp_servers:
  - name: ai-rulez
    command: npx
    args:
      - "-y"
      - ai-rulez@latest
      - mcp
    description: AI-Rulez MCP server for configuration management
  - name: test-server
    command: python
    args:
      - "-m"
      - test_server
    transport: stdio
    enabled: true
    env:
      DEBUG: "true"
      PORT: "3000"
