version: "3.0"
name: project-with-mixed-includes
description: Project that includes both rules and domain content
presets:
  - claude
includes:
  - name: backend-package
    source: ./backend-package
    include:
      - rules
    install_to: domains/backend
  - name: frontend-package
    source: ./frontend-package
    include:
      - rules
    install_to: domains/frontend
  - name: shared-rules
    source: ./shared-rules
    include:
      - rules
      - context
    merge_strategy: local-override
