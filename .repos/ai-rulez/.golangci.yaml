version: "2"

run:
  timeout: 5m
  tests: true
  concurrency: 4
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gocyclo
    - goconst
    - gocritic
    - gosec
    - misspell
    - nakedret
    - bodyclose
    - contextcheck
    - errorlint
    - nilerr
    - copyloopvar
    - whitespace
    
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - (io.Closer).Close
        - fmt.Printf
        - fmt.Println
        
    goconst:
      min-len: 3
      min-occurrences: 3
      
    gocyclo:
      min-complexity: 15
      
    gosec:
      excludes:
        - G101
        
    govet:
      enable-all: true
      disable:
        - shadow
        - fieldalignment
        
    misspell:
      locale: US
      
    nakedret:
      max-func-lines: 30
      
    revive:
      confidence: 0.8
      severity: warning
      rules:
        - name: blank-imports
        - name: context-keys-type
        - name: time-naming
        - name: var-declaration
        - name: unexported-return
        - name: errorf
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
          
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - whyNoLint
        - paramTypeCombine
        
  exclusions:
    generated: lax
    
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - goconst
          - gosec
          - gocyclo
          - gocritic

      - path: tests/fixtures/violations/
        linters:
          - errcheck
          - govet
          - staticcheck
          - unused
          - bodyclose
          - gocritic
          - gosec
          
      - linters:
          - errcheck
        source: "defer .*.Close"
        
      - linters:
          - errcheck
        source: "cmd.Flags\\(\\).Get"
        
      - linters:
          - errcheck
        source: "json.MarshalIndent"
        
      - linters:
          - errcheck
        source: "hashPool.Get"
        
      - linters:
          - errcheck
        source: "field.Default.\\("
        
      - linters:
          - errcheck
        source: "defer.*writer.Flush"
        
      - linters:
          - errcheck
        source: "filepath.Match"
        
      - linters:
          - errcheck
        source: "bufferPool.Get\\(\\)"
        
      - linters:
          - errcheck
        source: "cached\\.\\("
        
      - linters:
          - errcheck
        source: "element\\.\\(\\*config\\."
        
      - path: cmd/commands/crud/generic_factory.go
        linters:
          - gocyclo
        
      - path: internal/templates/
        linters:
          - goconst
          
      - linters:
          - govet
        text: "fieldalignment:"
        
      - linters:
          - govet
        text: "unusedwrite:"
        
      - linters:
          - revive
        text: "var-naming: avoid .*package names"
        
      - linters:
          - gosec
        text: "G301|G302|G304|G306"
        
    paths:
      - vendor
      - build
      - dist
      - node_modules
      - homebrew-tap

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true
  new: false
