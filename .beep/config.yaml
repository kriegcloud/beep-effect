version: 1
project:
  name: beep-effect3

settings:
  ownership: full_file_rewrite
  commit_generated: true
  require_revert_backups: true

instructions:
  root:
    - .beep/instructions/root.md
    - .beep/instructions/security.md
  packages:
    strategy: generate_for_all_packages
    template: .beep/templates/AGENTS.package.md.hbs

commands: []
hooks: []

mcp:
  secret_provider:
    type: onepassword
    required: true
  servers: []

agents:
  definitions:
    - id: default-reviewer
      prompt_file: .beep/agents/reviewer.md

skills:
  sources:
    - .agents/skills
  include: []

tool_overrides:
  claude: {}
  codex: {}
  cursor: {}
  windsurf: {}
  jetbrains: {}

manifests:
  managed_files: .beep/manifests/managed-files.json
  state: .beep/manifests/state.json
