[extend]
useDefault = true

[[allowlists]]
description = "Vendored openclaw subtree contains upstream docs and test fixtures with placeholder secrets"
paths = [
  '''^\.repos/openclaw/.*$''',
]

[[allowlists]]
description = "Venice OpenAPI operation id is not a secret"
regexes = [
  '''getApiKeyGenerateWeb3Key''',
]

[[allowlists]]
description = "CauseRedaction is a secret-redaction helper; its JSDoc @example blocks and tests intentionally contain placeholder secret-shaped strings (sk-/token=/API_KEY=) to demonstrate redaction. These are not real secrets. Anchored at the repo root (with an optional /repo/ CI-mount prefix) so a nested attacker-controlled path like evil/packages/.../CauseRedaction.ts cannot inherit the allowlist."
paths = [
  '''^(?:/repo/)?packages/foundation/capability/observability/src/CauseRedaction\.ts$''',
  '''^(?:/repo/)?packages/foundation/capability/observability/test/CauseRedaction\.test\.ts$''',
]

[[allowlists]]
description = "law-practice slice test fixtures are synthetic/public-only by mandate (privilege wall: a fixture is never a real client matter). Synthetic fixture keys such as \"rejection.102\" (a §102 rejection key) trip the generic-api-key entropy heuristic but are not secrets."
paths = [
  '''(^|/)packages/law-practice/[^/]+/test/.*$''',
]

[[allowlists]]
description = "@beep/data generated dataset modules are machine-generated by `bun run beep sync-data-to-ts` from public official registries (IANA media types, IANA tzdb, Unicode CLDR, ISO 4217). Long technical identifiers in these public datasets trip the generic-api-key entropy heuristic but are not secrets. Anchored at the repo root (with an optional /repo/ CI-mount prefix) so a nested attacker-controlled path cannot inherit the allowlist."
paths = [
  '''^(?:/repo/)?packages/foundation/primitive/data/src/generated/.*$''',
]
