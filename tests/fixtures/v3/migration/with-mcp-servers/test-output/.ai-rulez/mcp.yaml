$schema: https://raw.githubusercontent.com/Goldziher/ai-rulez/main/schema/mcp-config.schema.json
version: "1.0"
mcp_servers:
    - name: ai-rulez
      description: AI-Rulez MCP server for configuration management
      command: npx
      args:
        - -y
        - ai-rulez@latest
        - mcp
    - name: test-server
      command: python
      args:
        - -m
        - test_server
      env:
        DEBUG: "true"
        PORT: "3000"
      transport: stdio
      enabled: true
