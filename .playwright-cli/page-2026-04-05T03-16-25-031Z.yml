                    - text: "@prefix doc: <urn:beep-effect:doc-ontology#> . @prefix owl: <http://www.w3.org/2002/07/owl#> . @prefix prov: <http://www.w3.org/ns/prov#> . @prefix rdf: <http://www.w3.org/1999/02/22-rdf-syntax-ns#> . @prefix rdfs: <http://www.w3.org/2000/01/rdf-schema#> . @prefix xsd: <http://www.w3.org/2001/XMLSchema#> . doc:ontology a owl:Ontology ; rdfs:label \"beep-effect Documentation Ontology\" ; rdfs:comment \"Documentation-memory ontology for beep-effect. Native TrustGraph TBox only; companion rule instances and semantic-web seed data live in separate outputs.\" ; owl:versionInfo \"0.1.0\" . doc:documentation-concept a owl:Class ; rdfs:label \"documentation concept\"@en ; rdfs:comment \"Base documentation-domain concept used by the beep-effect documentation ontology.\" . doc:documentation-standard a owl:Class ; rdfs:label \"documentation standard\"@en ; rdfs:comment \"Canonical documentation standard or specification that defines a tag or policy surface.\" ; rdfs:subClassOf doc:documentation-concept . doc:documentation-tag a owl:Class ; rdfs:label \"documentation tag\"@en ; rdfs:comment \"Documentation tag definition such as @param or @returns.\" ; rdfs:subClassOf doc:documentation-concept . doc:documentation-rule a owl:Class ; rdfs:label \"documentation rule\"@en ; rdfs:comment \"Normative documentation rule or policy statement.\" ; rdfs:subClassOf doc:documentation-concept . doc:documentation-requirement a owl:Class ; rdfs:label \"documentation requirement\"@en ; rdfs:comment \"Documentation rule that requires a behavior or artifact.\" ; rdfs:subClassOf doc:documentation-rule . doc:documentation-prohibition a owl:Class ; rdfs:label \"documentation prohibition\"@en ; rdfs:comment \"Documentation rule that forbids a behavior or artifact.\" ; rdfs:subClassOf doc:documentation-rule . doc:documentation-artifact a owl:Class ; rdfs:label \"documentation artifact\"@en ; rdfs:comment \"Documentation artifact or output kind used by generation or validation flows.\" ; rdfs:subClassOf doc:documentation-concept . doc:documentation-symbol-kind a owl:Class ; rdfs:label \"documentation symbol kind\"@en ; rdfs:comment \"Normalized bridge kind that connects AST applicability surfaces, docgen entity kinds, and repo symbol kinds.\" ; rdfs:subClassOf doc:documentation-concept . doc:ast-applicable-kind a owl:Class ; rdfs:label \"AST applicable kind\"@en ; rdfs:comment \"Raw AST-level documentation attachment kind from the JSDoc models.\" ; rdfs:subClassOf doc:documentation-concept . doc:docgen-entity-kind a owl:Class ; rdfs:label \"docgen entity kind\"@en ; rdfs:comment \"Docgen-facing export or entity kind surfaced by repo tooling.\" ; rdfs:subClassOf doc:documentation-concept . doc:repo-symbol-kind a owl:Class ; rdfs:label \"repo symbol kind\"@en ; rdfs:comment \"Deterministic repository symbol kind used by repo-memory indexing.\" ; rdfs:subClassOf doc:documentation-concept . doc:ast-derivability-level a owl:Class ; rdfs:label \"AST derivability level\"@en ; rdfs:comment \"How much of a documentation tag can be derived mechanically from the AST.\" ; rdfs:subClassOf doc:documentation-concept . doc:tag-parameter-shape a owl:Class ; rdfs:label \"tag parameter shape\"@en ; rdfs:comment \"Structured syntax and boolean acceptance metadata for tag parameters.\" ; rdfs:subClassOf doc:documentation-concept . doc:source-authority a owl:Class ; rdfs:label \"source authority\"@en ; rdfs:comment \"Source-of-truth authority used to justify seeded facts, mappings, or rules.\" ; rdfs:subClassOf doc:documentation-concept . doc:validation-tool a owl:Class ; rdfs:label \"validation tool\"@en ; rdfs:comment \"Validator or analysis tool that enforces or reports on documentation behavior.\" ; rdfs:subClassOf doc:documentation-concept . doc:validation-support-status a owl:Class ; rdfs:label \"validation support status\"@en ; rdfs:comment \"Classification of whether a rule is supported today, possible with glue, or not realistic today.\" ; rdfs:su