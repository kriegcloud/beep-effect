# Release Desktop (Tauri)
#
# Builds the `apps/professional-desktop` Tauri v2 app and stages draft GitHub
# Releases, including auto-updater artifacts (`latest.json` + per-target
# signatures). Release managers publish the draft only after every matrix target
# is green. Each target compiles natively on its own OS runner — there is NO
# cross-compilation — because the bundled Bun sidecar is compiled per
# `rustc -vV` host target triple (see `scripts/build-sidecar.ts`).
#
# Triggered by pushing a tag matching `professional-desktop-v*` (kept distinct
# from the npm/changeset release tags), or manually via workflow_dispatch.
#
# REQUIRED secrets (auto-updater signing — ALWAYS applied):
#   TAURI_SIGNING_PRIVATE_KEY           — minisign private key for the updater.
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — OPTIONAL: set ONLY if the key has a
#       password. The scaffolded key is passwordless, so LEAVE THIS SECRET UNSET
#       (the env expression then expands to "", which is required since GitHub
#       Actions secrets cannot hold an empty string). Rotate to a
#       password-protected key for production.
#   Source from 1Password:
#     op://BEEP_SECRETS/BEEP_SECRETS/TAURI_SIGNING_PRIVATE_KEY
#   The matching PUBLIC key must live in `src-tauri/tauri.conf.json`
#   (plugins.updater.pubkey). The updater endpoint there points at this repo's
#   GitHub Releases `latest.json`
#   (https://github.com/kriegcloud/beep-effect/releases/latest/download/latest.json),
#   so the draft Release staged by this workflow is what clients auto-update
#   from after it is manually published.
#
# OPTIONAL secrets (platform code-signing — GATED, build stays UNSIGNED when
# absent; the build never fails just because these are missing):
#   macOS notarization + signing: APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
#     APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID.
#   Windows: see the commented Azure Trusted Signing placeholder below.

name: Release Desktop

on:
  push:
    tags:
      - "professional-desktop-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to publish, e.g. professional-desktop-v0.1.0"
        required: true
        type: string

concurrency:
  group: release-desktop-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release-desktop:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    environment: professional-desktop-release
    timeout-minutes: 120
    env:
      RELEASE_DESKTOP_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    strategy:
      # tauri-action mutates one release per matrix target. Keep matrix legs
      # serial and draft-only so a partial public updater release cannot escape.
      fail-fast: true
      max-parallel: 1
      matrix:
        include:
          - name: macOS arm64
            os: macos-14
            rust-target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - name: macOS x64
            os: macos-15-intel
            rust-target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - name: Linux x64
            os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            args: ""
          - name: Windows x64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            args: ""
    steps:
      - name: Validate release tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ ! "$RELEASE_DESKTOP_TAG" =~ ^professional-desktop-v.+$ ]]; then
            echo "::error::Release tag must match professional-desktop-v*, got '$RELEASE_DESKTOP_TAG'"
            exit 1
          fi
          if ! gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_DESKTOP_TAG}" >/dev/null; then
            echo "::error::Release tag '${RELEASE_DESKTOP_TAG}' does not exist. Push the tag before running this workflow."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.version) || github.ref }}

      - name: Verify release tag checkout
        shell: bash
        run: |
          git fetch --force --tags origin "refs/tags/${RELEASE_DESKTOP_TAG}:refs/tags/${RELEASE_DESKTOP_TAG}"
          tag_commit="$(git rev-list -n 1 "refs/tags/${RELEASE_DESKTOP_TAG}")"
          head_commit="$(git rev-parse HEAD)"
          if [[ "${head_commit}" != "${tag_commit}" ]]; then
            echo "::error::Checked out ${head_commit}, but ${RELEASE_DESKTOP_TAG} points to ${tag_commit}."
            exit 1
          fi

      - name: Validate updater signing secret
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is required for updater signing."
            exit 1
          fi

      # Tauri v2 Linux prerequisites (webkit2gtk 4.1, gtk, rsvg, appindicator, …).
      - name: Install Tauri Linux system dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.rust-target }}
          # Caches ~/.cargo and src-tauri/target keyed on the Cargo.lock + matrix.
          cache: true
          cache-workspaces: apps/professional-desktop/src-tauri

      # Restores bun + node and installs workspace deps via
      # `bun install --frozen-lockfile`, so `bun run build:sidecar` (needs bun)
      # and the `beforeBuildCommand` frontend build both work.
      - name: Setup monorepo CI
        uses: ./.github/actions/setup-monorepo-ci
        with:
          cache-turbo: "false"
          cache-write: "false"

      - name: Build Bun sidecar
        shell: bash
        run: bun run --cwd apps/professional-desktop build:sidecar

      - name: Build and publish desktop release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        env:
          # Auto-provisioned; required by the action to create/update the Release.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # --- Auto-updater signing (ALWAYS applied) ---
          # Signs `latest.json` + bundle signatures so clients can verify updates.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

          # --- macOS code-signing + notarization (GATED / optional) ---
          # When these secrets are empty, tauri-action builds an UNSIGNED app and
          # skips notarization — the build still succeeds. Signing/notarization
          # only activate once all of these secrets exist in the repo/environment.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

          # --- Windows code-signing (GATED / optional) — DEFAULTS TO UNSIGNED ---
          # Placeholder: to enable Azure Trusted Signing, configure tauri.conf
          # `bundle.windows.signCommand` (or the legacy certificate fields) and
          # surface the credentials here, e.g.:
          #   AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          #   AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          #   AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          #   AZURE_CODE_SIGNING_NAME: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
          #   AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
          # Until then, Windows builds are produced UNSIGNED.
        with:
          projectPath: apps/professional-desktop
          tagName: ${{ env.RELEASE_DESKTOP_TAG }}
          releaseName: "Professional Desktop ${{ env.RELEASE_DESKTOP_TAG }}"
          # Always stage drafts. Publish after every matrix target is green so
          # clients never see partial updater assets.
          releaseDraft: true
          prerelease: false
          # Per-arch native target (empty on Linux/Windows where the host target
          # already matches the runner).
          args: ${{ matrix.args }}

  release-desktop-ready:
    name: Desktop release draft ready
    runs-on: ubuntu-22.04
    needs: release-desktop
    if: ${{ always() }}
    env:
      RELEASE_DESKTOP_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    steps:
      - name: Verify every desktop target completed
        shell: bash
        env:
          RELEASE_DESKTOP_RESULT: ${{ needs.release-desktop.result }}
        run: |
          if [[ "${RELEASE_DESKTOP_RESULT}" != "success" ]]; then
            echo "::error title=Desktop release draft incomplete::At least one desktop release target failed. Keep the draft unpublished or delete it before retrying."
            exit 1
          fi
          echo "::notice::All desktop release targets completed successfully. The draft release is ready for manual smoke testing and publication."

      - name: Verify draft release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_json="$(gh release view "${RELEASE_DESKTOP_TAG}" --repo "${GITHUB_REPOSITORY}" --json assets,isDraft)"
          if [[ "$(jq -r '.isDraft' <<<"${release_json}")" != "true" ]]; then
            echo "::error::Release ${RELEASE_DESKTOP_TAG} is not a draft. Do not publish updater artifacts before manual smoke testing."
            exit 1
          fi

          mapfile -t asset_names < <(jq -r '.assets[].name' <<<"${release_json}")
          require_asset() {
            local label="$1"
            local pattern="$2"
            if ! printf '%s\n' "${asset_names[@]}" | grep -Eiq "${pattern}"; then
              echo "::error::Draft release ${RELEASE_DESKTOP_TAG} is missing ${label} asset."
              printf 'Observed assets:\n%s\n' "${asset_names[*]}"
              exit 1
            fi
          }

          require_asset "latest.json" '^latest\.json$'
          require_asset "macOS arm64 updater/bundle" '(aarch64|arm64).*(dmg|app\.tar\.gz)|(dmg|app\.tar\.gz).*(aarch64|arm64)'
          require_asset "macOS x64 updater/bundle" '(x64|x86_64).*(dmg|app\.tar\.gz)|(dmg|app\.tar\.gz).*(x64|x86_64)'
          require_asset "Linux x64 updater/bundle" '(linux|appimage|\.deb|\.rpm).*(x64|x86_64|amd64)|(x64|x86_64|amd64).*(linux|appimage|\.deb|\.rpm)'
          require_asset "Windows x64 updater/bundle" '(windows|msi|exe|nsis).*(x64|x86_64)|(x64|x86_64).*(windows|msi|exe|nsis)'

          asset_dir="${RUNNER_TEMP}/desktop-release-assets"
          mkdir -p "${asset_dir}"
          gh release download "${RELEASE_DESKTOP_TAG}" --repo "${GITHUB_REPOSITORY}" --pattern latest.json --dir "${asset_dir}" --clobber
          jq -e '.version and .platforms and (.platforms | length >= 4)' "${asset_dir}/latest.json" >/dev/null
