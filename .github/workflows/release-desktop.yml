# Release Desktop (Tauri)
#
# Builds the `apps/professional-desktop` Tauri v2 app, collects every native
# target as workflow artifacts, then stages one draft GitHub Release with
# auto-updater artifacts (`latest.json` + per-target signatures) after the full
# matrix is green. Each target compiles natively on its own OS runner — there is
# NO cross-compilation — because the bundled Bun sidecar is compiled per
# `rustc -vV` host target triple (see `scripts/build-sidecar.ts`).
#
# Triggered by pushing a tag matching `professional-desktop-v*` (kept distinct
# from the npm/changeset release tags), or manually via workflow_dispatch.
#
# REQUIRED secrets (auto-updater signing — ALWAYS applied):
#   TAURI_SIGNING_PRIVATE_KEY           — minisign private key for the updater.
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  — OPTIONAL: set ONLY if the key has a
#       password. The scaffolded key is passwordless, so LEAVE THIS SECRET UNSET
#       (the env expression then expands to "", which is required since GitHub
#       Actions secrets cannot hold an empty string). Rotate to a
#       password-protected key for production.
#   Store signing secrets as repository or organization secrets. The
#   `professional-desktop-release` environment is a single pre-matrix approval
#   gate; matrix jobs intentionally do not target the environment so one tag does
#   not require four separate native-build approvals.
#   Source from 1Password:
#     op://BEEP_SECRETS/BEEP_SECRETS/TAURI_SIGNING_PRIVATE_KEY
#   The matching PUBLIC key must live in `src-tauri/tauri.conf.json`
#   (plugins.updater.pubkey). The updater endpoint there points at this repo's
#   GitHub Releases `latest.json`
#   (https://github.com/kriegcloud/beep-effect/releases/latest/download/latest.json),
#   so the draft Release staged by this workflow is what clients auto-update
#   from after it is manually published.
#
# OPTIONAL secrets (platform code-signing — GATED, build stays UNSIGNED when
# absent; the build never fails just because these are missing):
#   macOS notarization + signing: APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
#     APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID.
#   Windows: see the commented Azure Trusted Signing placeholder below.

name: Release Desktop

on:
  push:
    tags:
      - "professional-desktop-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to publish, e.g. professional-desktop-v0.1.0"
        required: true
        type: string

concurrency:
  group: release-desktop-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-desktop-preflight:
    name: Validate desktop release inputs
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    env:
      RELEASE_DESKTOP_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    steps:
      - name: Validate release tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ ! "$RELEASE_DESKTOP_TAG" =~ ^professional-desktop-v.+$ ]]; then
            echo "::error::Release tag must match professional-desktop-v*, got '$RELEASE_DESKTOP_TAG'"
            exit 1
          fi
          if ! gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_DESKTOP_TAG}" >/dev/null; then
            echo "::error::Release tag '${RELEASE_DESKTOP_TAG}' does not exist. Push the tag before running this workflow."
            exit 1
          fi

      - name: Validate updater signing secret
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY must be configured as a repository or organization secret for updater signing. Matrix jobs intentionally stay behind the single professional-desktop-release approval gate and do not read environment-only secrets."
            exit 1
          fi

  release-desktop-approval:
    name: Approve desktop release signing
    runs-on: ubuntu-22.04
    needs: release-desktop-preflight
    environment: professional-desktop-release
    timeout-minutes: 10
    env:
      RELEASE_DESKTOP_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    steps:
      - name: Record protected release approval
        shell: bash
        run: |
          echo "::notice::Approved desktop release signing for ${RELEASE_DESKTOP_TAG}."

  release-desktop:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: release-desktop-approval
    timeout-minutes: 120
    env:
      RELEASE_DESKTOP_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-14
            rust-target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
            release-target: darwin-aarch64
            asset-arch: aarch64
            updater-platform: darwin-aarch64
            updater-suffixes: '[".app.tar.gz"]'
          - name: macOS x64
            os: macos-15-intel
            rust-target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
            release-target: darwin-x86_64
            asset-arch: x64
            updater-platform: darwin-x86_64
            updater-suffixes: '[".app.tar.gz"]'
          - name: Linux x64
            os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            args: ""
            release-target: linux-x86_64
            asset-arch: x86_64
            updater-platform: linux-x86_64
            updater-suffixes: '[".AppImage.tar.gz",".AppImage"]'
          - name: Windows x64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            args: ""
            release-target: windows-x86_64
            asset-arch: x64
            updater-platform: windows-x86_64
            updater-suffixes: '[".msi.zip",".nsis.zip",".msi","-setup.exe"]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.version) || github.ref }}

      - name: Verify release tag checkout
        uses: actions/github-script@v7
        with:
          script: |
            const { execFileSync } = require("node:child_process");

            const tag = process.env.RELEASE_DESKTOP_TAG;
            execFileSync("git", ["fetch", "--force", "--tags", "origin", `refs/tags/${tag}:refs/tags/${tag}`], {
              stdio: "inherit",
            });
            const tagCommit = execFileSync("git", ["rev-list", "-n", "1", `refs/tags/${tag}`], {
              encoding: "utf8",
            }).trim();
            const headCommit = execFileSync("git", ["rev-parse", "HEAD"], {
              encoding: "utf8",
            }).trim();
            if (headCommit !== tagCommit) {
              throw new Error(`Checked out ${headCommit}, but ${tag} points to ${tagCommit}.`);
            }

      # Tauri v2 Linux prerequisites (webkit2gtk 4.1, gtk, rsvg, appindicator, …).
      - name: Install Tauri Linux system dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.rust-target }}
          # Caches ~/.cargo and src-tauri/target keyed on the Cargo.lock + matrix.
          cache: true
          cache-workspaces: apps/professional-desktop/src-tauri

      # Restores bun + node and installs workspace deps via
      # `bun install --frozen-lockfile`, so `bun run build:sidecar` (needs bun)
      # and the `beforeBuildCommand` frontend build both work.
      - name: Setup monorepo CI
        uses: ./.github/actions/setup-monorepo-ci
        with:
          cache-turbo: "false"
          cache-write: "false"

      - name: Build Bun sidecar
        shell: bash
        run: bun run --cwd apps/professional-desktop build:sidecar

      - name: Build desktop bundle
        id: tauri
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        env:
          # Auto-provisioned; retained for tauri-action compatibility. Matrix
          # jobs intentionally omit tagName/releaseId, so they cannot mutate
          # GitHub Releases.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # --- Auto-updater signing (ALWAYS applied) ---
          # Signs `latest.json` + bundle signatures so clients can verify updates.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

          # --- macOS code-signing + notarization (GATED / optional) ---
          # When these secrets are empty, tauri-action builds an UNSIGNED app and
          # skips notarization — the build still succeeds. Signing/notarization
          # only activate once all of these secrets exist in the repo/environment.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

          # --- Windows code-signing (GATED / optional) — DEFAULTS TO UNSIGNED ---
          # Placeholder: to enable Azure Trusted Signing, configure tauri.conf
          # `bundle.windows.signCommand` (or the legacy certificate fields) and
          # surface the credentials here, e.g.:
          #   AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          #   AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          #   AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          #   AZURE_CODE_SIGNING_NAME: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
          #   AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
          # Until then, Windows builds are produced UNSIGNED.
        with:
          projectPath: apps/professional-desktop
          includeUpdaterJson: false
          # Per-arch native target (empty on Linux/Windows where the host target
          # already matches the runner).
          args: ${{ matrix.args }}

      - name: Stage desktop bundle artifact
        uses: actions/github-script@v7
        env:
          ARTIFACT_PATHS: ${{ steps.tauri.outputs.artifactPaths }}
          RELEASE_DESKTOP_ASSET_ARCH: ${{ matrix.asset-arch }}
          RELEASE_DESKTOP_TARGET: ${{ matrix.release-target }}
          STAGING_DIR: ${{ runner.temp }}/desktop-release-${{ matrix.release-target }}
          UPDATER_PLATFORM: ${{ matrix.updater-platform }}
          UPDATER_SUFFIXES: ${{ matrix.updater-suffixes }}
        with:
          script: |
            const fs = require("node:fs");
            const path = require("node:path");

            const artifactPaths = JSON.parse(process.env.ARTIFACT_PATHS || "[]");
            const assetArch = process.env.RELEASE_DESKTOP_ASSET_ARCH;
            const stagingDir = process.env.STAGING_DIR;
            const target = process.env.RELEASE_DESKTOP_TARGET;
            const updaterPlatform = process.env.UPDATER_PLATFORM;
            const updaterSuffixes = JSON.parse(process.env.UPDATER_SUFFIXES || "[]");

            if (!assetArch || !stagingDir || !target || !updaterPlatform) {
              throw new Error("Missing desktop release staging metadata.");
            }

            fs.mkdirSync(stagingDir, { recursive: true });

            const releaseAssetName = (artifactPath) => {
              const name = path.basename(artifactPath);
              if (target.startsWith("darwin-") && name.endsWith(".app.tar.gz")) {
                return `${name.slice(0, -".app.tar.gz".length)}_${assetArch}.app.tar.gz`;
              }
              if (target.startsWith("darwin-") && name.endsWith(".app.tar.gz.sig")) {
                return `${name.slice(0, -".app.tar.gz.sig".length)}_${assetArch}.app.tar.gz.sig`;
              }
              return name;
            };

            const assets = [];
            const artifactPathSet = new Set(artifactPaths);
            for (const artifactPath of artifactPaths) {
              if (!fs.existsSync(artifactPath)) {
                throw new Error(`Expected tauri artifact path does not exist: ${artifactPath}`);
              }

              const stat = fs.statSync(artifactPath);
              if (stat.isDirectory()) {
                const archivePath = `${artifactPath}.tar.gz`;
                const hasUpdaterArchive =
                  artifactPath.endsWith(".app") &&
                  artifactPathSet.has(archivePath) &&
                  fs.existsSync(archivePath) &&
                  fs.statSync(archivePath).isFile();

                if (hasUpdaterArchive) {
                  continue;
                }

                throw new Error(`Expected tauri artifact path to be a file: ${artifactPath}`);
              }

              if (!stat.isFile()) {
                throw new Error(`Expected tauri artifact path to be a file: ${artifactPath}`);
              }

              const assetName = releaseAssetName(artifactPath);
              fs.copyFileSync(artifactPath, path.join(stagingDir, assetName));
              assets.push(assetName);
            }

            const selectUpdaterPair = () => {
              for (const suffix of updaterSuffixes) {
                const updaterAsset = assets.find((name) => name.endsWith(suffix));
                if (!updaterAsset) {
                  continue;
                }
                const signatureAsset = `${updaterAsset}.sig`;
                if (assets.includes(signatureAsset)) {
                  return { updaterAsset, signatureAsset };
                }
              }
              return null;
            };

            const updaterPair = selectUpdaterPair();
            if (!updaterPair) {
              throw new Error(
                `Could not find an updater asset/signature pair for ${updaterPlatform}. Observed assets: ${assets.join(", ")}`,
              );
            }

            fs.writeFileSync(
              path.join(stagingDir, "manifest.json"),
              JSON.stringify(
                {
                  target,
                  updaterPlatform,
                  assets,
                  ...updaterPair,
                },
                null,
                2,
              ),
            );

      - name: Upload desktop bundle artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: desktop-release-${{ matrix.release-target }}
          path: ${{ runner.temp }}/desktop-release-${{ matrix.release-target }}
          if-no-files-found: error

  release-desktop-ready:
    name: Desktop release draft ready
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      contents: write
    needs:
      - release-desktop-approval
      - release-desktop
    if: ${{ always() && needs.release-desktop.result != 'skipped' }}
    env:
      EXPECTED_RELEASE_TARGETS: darwin-aarch64,darwin-x86_64,linux-x86_64,windows-x86_64
      RELEASE_DESKTOP_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    steps:
      - name: Verify every desktop target completed
        shell: bash
        env:
          RELEASE_DESKTOP_RESULT: ${{ needs.release-desktop.result }}
        run: |
          if [[ "${RELEASE_DESKTOP_RESULT}" == "cancelled" ]]; then
            echo "::error title=Desktop release draft cancelled::The desktop release matrix was cancelled after approval. Keep the draft unpublished or delete it before retrying."
            exit 1
          fi
          if [[ "${RELEASE_DESKTOP_RESULT}" != "success" ]]; then
            echo "::error title=Desktop release draft incomplete::At least one desktop release target failed. Keep the draft unpublished or delete it before retrying."
            exit 1
          fi
          echo "::notice::All desktop release targets completed successfully. Staging the draft release."

      - name: Download desktop bundle artifacts
        if: ${{ needs.release-desktop.result == 'success' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: desktop-release-*
          path: ${{ runner.temp }}/desktop-release-artifacts
          merge-multiple: false

      - name: Stage and verify draft release assets
        if: ${{ needs.release-desktop.result == 'success' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          artifact_root="${RUNNER_TEMP}/desktop-release-artifacts"
          mapfile -t manifests < <(find "${artifact_root}" -name manifest.json -type f | sort)
          if [[ "${#manifests[@]}" -eq 0 ]]; then
            echo "::error::No desktop release manifests were downloaded."
            exit 1
          fi

          expected_assets="${RUNNER_TEMP}/desktop-expected-assets.txt"
          expected_platforms="${RUNNER_TEMP}/desktop-expected-platforms.txt"
          expected_targets="${RUNNER_TEMP}/desktop-expected-targets.txt"
          actual_targets="${RUNNER_TEMP}/desktop-actual-targets.txt"
          tr ',' '\n' <<<"${EXPECTED_RELEASE_TARGETS}" | sort > "${expected_targets}"
          expected_target_count="$(wc -l < "${expected_targets}")"
          if [[ "${#manifests[@]}" -ne "${expected_target_count}" ]]; then
            echo "::error::Expected ${expected_target_count} desktop release manifests, found ${#manifests[@]}."
            exit 1
          fi

          jq -r '.target' "${manifests[@]}" | sort > "${actual_targets}"
          if ! diff -u "${expected_targets}" "${actual_targets}"; then
            echo "::error::Downloaded desktop release manifests do not match the release matrix targets."
            exit 1
          fi

          jq -r '.assets[]' "${manifests[@]}" | sort > "${expected_assets}"
          jq -r '.updaterPlatform' "${manifests[@]}" | sort > "${expected_platforms}"

          if [[ "$(wc -l < "${expected_assets}")" != "$(sort -u "${expected_assets}" | wc -l)" ]]; then
            echo "::error::Desktop release manifests contain duplicate asset names."
            exit 1
          fi
          if [[ "$(wc -l < "${expected_platforms}")" != "$(sort -u "${expected_platforms}" | wc -l)" ]]; then
            echo "::error::Desktop release manifests contain duplicate updater platform keys."
            exit 1
          fi

          release_json="$(gh release view "${RELEASE_DESKTOP_TAG}" --repo "${GITHUB_REPOSITORY}" --json databaseId,isDraft 2>/dev/null || true)"
          if [[ -z "${release_json}" ]]; then
            gh release create "${RELEASE_DESKTOP_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --draft \
              --verify-tag \
              --title "Professional Desktop ${RELEASE_DESKTOP_TAG}" \
              --notes "Draft desktop release staged by CI after every native target completed."
            release_json="$(gh release view "${RELEASE_DESKTOP_TAG}" --repo "${GITHUB_REPOSITORY}" --json databaseId,isDraft)"
          fi

          if [[ "$(jq -r '.isDraft' <<<"${release_json}")" != "true" ]]; then
            echo "::error::Release ${RELEASE_DESKTOP_TAG} is not a draft. Do not publish updater artifacts before manual smoke testing."
            exit 1
          fi

          release_id="$(jq -r '.databaseId' <<<"${release_json}")"
          while IFS=$'\t' read -r asset_id asset_name; do
            if [[ -z "${asset_id}" ]]; then
              continue
            fi
            echo "Deleting stale draft asset ${asset_name}."
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}" >/dev/null
          done < <(gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets?per_page=100" --paginate --jq '.[] | [.id, .name] | @tsv')

          while IFS= read -r asset_name; do
            asset_file="$(find "${artifact_root}" -type f -name "${asset_name}" -print -quit)"
            if [[ -z "${asset_file}" ]]; then
              echo "::error::Expected desktop asset ${asset_name} is missing from downloaded artifacts."
              exit 1
            fi
            gh release upload "${RELEASE_DESKTOP_TAG}" "${asset_file}" --repo "${GITHUB_REPOSITORY}" --clobber
          done < "${expected_assets}"

          release_assets="${RUNNER_TEMP}/desktop-release-assets.jsonl"
          gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets?per_page=100" \
            --paginate \
            --jq '.[] | {name, browser_download_url}' > "${release_assets}"

          uploaded_assets="${RUNNER_TEMP}/desktop-uploaded-assets.txt"
          jq -r '.name' "${release_assets}" | sort > "${uploaded_assets}"
          comm -23 "${expected_assets}" "${uploaded_assets}" | sed 's/^/missing asset: /' > "${RUNNER_TEMP}/desktop-missing-assets.txt"
          if [[ -s "${RUNNER_TEMP}/desktop-missing-assets.txt" ]]; then
            cat "${RUNNER_TEMP}/desktop-missing-assets.txt"
            echo "::error::Draft release is missing one or more matrix-declared assets."
            exit 1
          fi

          latest_json="${RUNNER_TEMP}/latest.json"
          app_version="$(jq -r '.version' apps/professional-desktop/package.json)"
          jq -n \
            --arg version "${app_version}" \
            --arg notes "Professional Desktop ${RELEASE_DESKTOP_TAG}" \
            '{ version: $version, notes: $notes, pub_date: (now | todateiso8601), platforms: {} }' > "${latest_json}"

          for manifest in "${manifests[@]}"; do
            platform="$(jq -r '.updaterPlatform' "${manifest}")"
            updater_asset="$(jq -r '.updaterAsset' "${manifest}")"
            signature_asset="$(jq -r '.signatureAsset' "${manifest}")"
            updater_url="$(jq -r --arg name "${updater_asset}" 'select(.name == $name) | .browser_download_url' "${release_assets}" | head -n 1)"
            signature_file="$(find "${artifact_root}" -type f -name "${signature_asset}" -print -quit)"

            if [[ -z "${updater_url}" ]]; then
              echo "::error::Matrix platform ${platform} references updater asset ${updater_asset}, which was not uploaded."
              exit 1
            fi
            if [[ -z "${signature_file}" ]]; then
              echo "::error::Matrix platform ${platform} references signature asset ${signature_asset}, which is missing from artifacts."
              exit 1
            fi

            signature="$(tr -d '\r\n' < "${signature_file}")"
            if [[ -z "${signature}" ]]; then
              echo "::error::Signature asset ${signature_asset} for ${platform} is empty."
              exit 1
            fi

            tmp_latest="${latest_json}.tmp"
            jq \
              --arg platform "${platform}" \
              --arg url "${updater_url}" \
              --arg signature "${signature}" \
              '.platforms[$platform] = { signature: $signature, url: $url }' \
              "${latest_json}" > "${tmp_latest}"
            mv "${tmp_latest}" "${latest_json}"
          done

          actual_platforms="${RUNNER_TEMP}/desktop-actual-platforms.txt"
          jq -r '.platforms | keys[]' "${latest_json}" | sort > "${actual_platforms}"
          if ! diff -u "${expected_platforms}" "${actual_platforms}"; then
            echo "::error::latest.json platform keys do not match the matrix manifests."
            exit 1
          fi

          for manifest in "${manifests[@]}"; do
            platform="$(jq -r '.updaterPlatform' "${manifest}")"
            updater_asset="$(jq -r '.updaterAsset' "${manifest}")"
            signature_asset="$(jq -r '.signatureAsset' "${manifest}")"
            expected_url="$(jq -r --arg name "${updater_asset}" 'select(.name == $name) | .browser_download_url' "${release_assets}" | head -n 1)"
            actual_url="$(jq -r --arg platform "${platform}" '.platforms[$platform].url' "${latest_json}")"
            expected_signature="$(tr -d '\r\n' < "$(find "${artifact_root}" -type f -name "${signature_asset}" -print -quit)")"
            actual_signature="$(jq -r --arg platform "${platform}" '.platforms[$platform].signature' "${latest_json}")"

            if [[ "${actual_url}" != "${expected_url}" ]]; then
              echo "::error::latest.json URL for ${platform} does not match uploaded asset ${updater_asset}."
              exit 1
            fi
            if [[ "${actual_signature}" != "${expected_signature}" ]]; then
              echo "::error::latest.json signature for ${platform} does not match ${signature_asset}."
              exit 1
            fi
          done

          gh release upload "${RELEASE_DESKTOP_TAG}" "${latest_json}" --repo "${GITHUB_REPOSITORY}" --clobber
          gh release view "${RELEASE_DESKTOP_TAG}" --repo "${GITHUB_REPOSITORY}" --json assets,isDraft \
            --jq 'select(.isDraft == true) | .assets[].name' | grep -Fx latest.json >/dev/null
          echo "::notice::Draft release ${RELEASE_DESKTOP_TAG} contains all matrix-declared assets and a complete latest.json."
