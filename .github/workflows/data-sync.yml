name: Official Data Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 15 * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-data:
    name: Sync Official Data
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM || secrets.TURBO_TEAM }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup monorepo CI
        uses: ./.github/actions/setup-monorepo-ci
        with:
          cache-turbo: true
          cache-write: "true"

      - name: Sync official datasets
        run: bun run beep sync-data-to-ts --all --report-dir "$RUNNER_TEMP/data-sync-report"

      - name: Upload data sync report
        uses: actions/upload-artifact@v4
        with:
          name: data-sync-report
          path: ${{ runner.temp }}/data-sync-report
          if-no-files-found: error

      - name: Run focused check verification
        id: focused-check
        run: bun run check -- --filter=@beep/repo-cli --filter=@beep/data --filter=@beep/schema --filter=@beep/md --summarize

      - name: Append Turbo summary (check)
        if: always() && steps.focused-check.outcome != 'skipped'
        run: bun run beep ci append-turbo-summary

      - name: Run focused unit verification
        id: focused-test
        if: steps.focused-check.outcome == 'success'
        run: bun run test -- --unit --filter=@beep/repo-cli --filter=@beep/data --filter=@beep/schema --filter=@beep/md --summarize

      - name: Prepare pull request body
        id: pr-body
        if: always()
        run: |
          {
            echo 'body<<EOF'
            cat "$RUNNER_TEMP/data-sync-report/data-sync-report.md"
            echo
            echo 'This PR was opened automatically by `.github/workflows/data-sync.yml`.'
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Append Turbo summary (test)
        if: always() && steps.focused-test.outcome != 'skipped'
        run: bun run beep ci append-turbo-summary

      - name: Create or update pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.BEEP_DATA_SYNC_TOKEN != '' && secrets.BEEP_DATA_SYNC_TOKEN || github.token }}
          branch: automation/data-sync
          delete-branch: true
          commit-message: "chore(data): sync official datasets"
          title: "chore(data): sync official datasets"
          body: ${{ steps.pr-body.outputs.body }}
