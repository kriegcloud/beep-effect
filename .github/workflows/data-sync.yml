name: Official Data Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 15 1 *"

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-data:
    name: Sync Official Data
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM || secrets.TURBO_TEAM }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup monorepo CI
        uses: ./.github/actions/setup-monorepo-ci
        with:
          cache-turbo: true
          cache-write: "true"

      - name: Sync official datasets
        run: bun run beep sync-data-to-ts --all

      - name: Run focused Turbo verification
        run: |
          bun run check -- --filter=@beep/repo-cli --filter=@beep/data --summarize
          node scripts/append-turbo-summary.mjs
          bun run test -- --unit --filter=@beep/repo-cli --filter=@beep/data --summarize
          node scripts/append-turbo-summary.mjs

      - name: Create or update pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.BEEP_DATA_SYNC_TOKEN != '' && secrets.BEEP_DATA_SYNC_TOKEN || github.token }}
          branch: automation/data-sync
          delete-branch: true
          commit-message: "chore(data): sync official datasets"
          title: "chore(data): sync official datasets"
          body: |
            ## Summary

            - refresh official generated datasets with `bun run beep sync-data-to-ts --all`
            - re-run the focused CLI and `@beep/data` verification steps

            This PR was opened automatically by `.github/workflows/data-sync.yml`.
