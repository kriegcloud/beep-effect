name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      confirm_publish:
        description: 'Type PUBLISH to approve publish'
        required: true
        default: ""
        type: string

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-pr:
    name: Release PR
    if: github.event_name == 'push'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect pending changesets
        id: pending-changesets
        shell: bash
        run: |
          if find .changeset -maxdepth 1 -type f -name "*.md" ! -name "README.md" | grep -q .; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "No pending changesets; skipping release PR creation."
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup monorepo CI
        if: steps.pending-changesets.outputs.has_changesets == 'true'
        uses: ./.github/actions/setup-monorepo-ci
        with:
          cache-turbo: false

      - name: Validate changeset package graph
        if: steps.pending-changesets.outputs.has_changesets == 'true'
        run: bun run beep quality changeset-graph

      - name: Detect release diff
        id: release-diff
        if: steps.pending-changesets.outputs.has_changesets == 'true'
        shell: bash
        run: |
          bun run changeset:version
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_release_diff=true" >> "$GITHUB_OUTPUT"
            git status --short
          else
            echo "No release diff produced by changeset version; skipping release PR creation."
            echo "has_release_diff=false" >> "$GITHUB_OUTPUT"
          fi
          git reset --hard HEAD

      - name: Create or update release pull request
        if: steps.release-diff.outputs.has_release_diff == 'true'
        uses: changesets/action@v1
        with:
          version: bun run changeset:version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          LEFTHOOK: "0"
          # Auto-provisioned by GitHub Actions; requires permissions above.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish (Manual Approval Required)
    if: github.event_name == 'workflow_dispatch' && inputs.confirm_publish ==
      'PUBLISH'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    environment:
      # Configure this environment with required reviewers to enforce approval.
      name: release-publish
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM || secrets.TURBO_TEAM }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup monorepo CI
        uses: ./.github/actions/setup-monorepo-ci
        with:
          cache-turbo: true

      - name: Configure npm registry access
        uses: actions/setup-node@v4
        with:
          registry-url: https://registry.npmjs.org
          node-version-file: .nvmrc

      - name: Publish packages via locked release script
        run: bun run release
        env:
          # Required repository secret: npm automation token with publish access.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
