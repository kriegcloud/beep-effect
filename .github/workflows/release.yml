name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release PR or Publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create release pull request or publish packages
        uses: changesets/action@v1
        with:
          version: bun run changeset:version
          # Root release script enforces locked publish gates:
          # build -> test -> lint -> changeset publish
          publish: bun run release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          # Auto-provisioned by GitHub Actions; requires permissions above.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required repository secret: npm automation token with publish access.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
