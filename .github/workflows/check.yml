name: Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-size:
    name: PR Size Label
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Count changed files
        id: changed
        uses: tj-actions/changed-files@v47

      - name: Label PR by size
        uses: actions/github-script@v7
        with:
          script: |
            const count = parseInt('${{ steps.changed.outputs.all_changed_files_count }}', 10);
            let label = 'size/S';
            if (count > 50) label = 'size/XL';
            else if (count > 20) label = 'size/L';
            else if (count > 10) label = 'size/M';
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [label]
            });
  verify:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: lint
            name: Lint
            timeout_minutes: 20
            uses_turbo: "true"
            install_typos: "true"
          - id: repo-sanity
            name: Repo Sanity
            timeout_minutes: 15
            uses_turbo: "false"
            install_typos: "false"
          - id: check
            name: Check
            timeout_minutes: 20
            uses_turbo: "true"
            install_typos: "false"
          - id: test-unit
            name: Test Unit
            timeout_minutes: 30
            uses_turbo: "true"
            install_typos: "false"
          - id: test-integration
            name: Test Integration
            timeout_minutes: 20
            uses_turbo: "true"
            install_typos: "false"
          - id: docgen
            name: Docgen
            timeout_minutes: 20
            uses_turbo: "false"
            install_typos: "false"
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM || secrets.TURBO_TEAM }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
      EMAIL_RESEND_API_KEY: ${{ secrets.EMAIL_RESEND_API_KEY }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
      SECURITY_TRUSTED_ORIGINS: ${{ secrets.SECURITY_TRUSTED_ORIGINS }}
      LIVEBLOCKS_SECRET_KEY: ${{ secrets.LIVEBLOCKS_SECRET_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine lane execution
        id: lane-gate
        shell: bash
        run: |
          set -euo pipefail
          should_run=true
          docgen_mode=none

          if [[ "${{ matrix.id }}" == "docgen" && "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            docgen_mode=affected
            base_ref="origin/${GITHUB_BASE_REF:-main}"
            if ! git rev-parse --verify "$base_ref" >/dev/null 2>&1; then
              git fetch --no-tags origin "${GITHUB_BASE_REF:-main}" --quiet
            fi

            changed_files="$(git diff --name-only "${base_ref}...HEAD")"

            if [[ -z "$changed_files" ]]; then
              should_run=false
            elif ! printf "%s\n" "$changed_files" | grep -Eq '(^apps/|^packages/|^infra/|^tooling/docgen/|^tooling/cli/src/commands/Docgen/|^docs/|/docgen\.json$|\.(ts|tsx|mts|cts|md)$)'; then
              should_run=false
            elif printf "%s\n" "$changed_files" | grep -Eq '(^tooling/docgen/|^tooling/cli/src/commands/Docgen/)'; then
              docgen_mode=full
            fi
          fi

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"
          echo "docgen_mode=$docgen_mode" >> "$GITHUB_OUTPUT"

      - name: Setup monorepo CI
        if: steps.lane-gate.outputs.should_run == 'true'
        uses: ./.github/actions/setup-monorepo-ci
        with:
          cache-turbo: ${{ matrix.uses_turbo }}
          cache-write: "false"

      - name: Install typos
        if: steps.lane-gate.outputs.should_run == 'true' && matrix.install_typos == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: typos-cli@1.44.0

      - name: Run verification lane
        if: steps.lane-gate.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          turbo_args=()

          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            export TURBO_SCM_BASE="origin/${GITHUB_BASE_REF:-main}"
            turbo_args+=(--affected)
          fi

          turbo_args+=(--summarize)

          case "${{ matrix.id }}" in
            lint)
              bun run lint -- "${turbo_args[@]}"
              ;;
            repo-sanity)
              bash scripts/run-github-checks.sh repo-sanity
              if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
                bun run changeset:status:since-main
              fi
              ;;
            check)
              bun run check -- "${turbo_args[@]}"
              ;;
            test-unit)
              bun run test -- --unit --types "${turbo_args[@]}"
              ;;
            test-integration)
              bun run test -- --integration "${turbo_args[@]}"
              ;;
            docgen)
              if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
                if [[ "${{ steps.lane-gate.outputs.docgen_mode }}" == "full" ]]; then
                  bun run docgen
                else
                  bunx turbo run docgen --affected --summarize
                  node scripts/append-turbo-summary.mjs
                  bun run docs:aggregate
                fi
              else
                bun run docgen
              fi
              ;;
          esac

      - name: Append Turbo summary
        if: matrix.uses_turbo == 'true' && steps.lane-gate.outputs.should_run == 'true' && always()
        run: node scripts/append-turbo-summary.mjs

      - name: Skip lane
        if: steps.lane-gate.outputs.should_run != 'true'
        run: echo "Skipping ${{ matrix.name }} for this change set."

  build:
    name: Build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM || secrets.TURBO_TEAM }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
      EMAIL_RESEND_API_KEY: ${{ secrets.EMAIL_RESEND_API_KEY }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
      SECURITY_TRUSTED_ORIGINS: ${{ secrets.SECURITY_TRUSTED_ORIGINS }}
      LIVEBLOCKS_SECRET_KEY: ${{ secrets.LIVEBLOCKS_SECRET_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup monorepo CI
        uses: ./.github/actions/setup-monorepo-ci
        with:
          cache-turbo: true
          cache-write: "true"

      - name: Run build checks
        run: bun run build -- --summarize

      - name: Append Turbo summary
        if: always()
        run: node scripts/append-turbo-summary.mjs

  secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: OSV vulnerability scan
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.3
        with:
          scan-args: |-
            --lockfile=bun.lock
            --config=osv-scanner.toml

      - name: Detect dependency graph availability
        if: github.event_name == 'pull_request'
        id: dependency-graph
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const status = data.security_and_analysis?.dependency_graph?.status ?? "disabled";
            core.info(`Dependency graph status: ${status}`);
            core.setOutput("enabled", status === "enabled" ? "true" : "false");

      - name: Dependency review
        if: github.event_name == 'pull_request' && steps.dependency-graph.outputs.enabled == 'true'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: AGPL-3.0, GPL-3.0
          comment-summary-in-pr: on-failure

  nix:
    name: Nix Shell
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: beep-effect
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
        continue-on-error: true

      - name: Run Nix checks
        run: bash scripts/run-github-checks.sh nix

  sast:
    name: SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Semgrep scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/typescript
            p/javascript
            p/security-audit
            p/secrets
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
