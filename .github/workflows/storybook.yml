name: Storybook

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build And Test
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM || secrets.TURBO_TEAM }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 100
          persist-credentials: false

      # Storybook build + Playwright Chromium + a large monorepo checkout can
      # exhaust the runner's disk ("No space left on device"). Mirror the
      # cleanup that check.yml already performs for its verification lanes.
      - name: Free runner disk
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          echo "Disk before cleanup:"
          df -h /
          sudo rm -rf \
            /opt/ghc \
            /usr/local/.ghcup \
            /usr/local/lib/android \
            /usr/local/share/boost \
            /usr/share/dotnet
          sudo apt-get clean
          docker system prune --all --force --volumes || true
          echo "Disk after cleanup:"
          df -h /

      - name: Setup monorepo CI
        uses: ./.github/actions/setup-monorepo-ci
        with:
          cache-turbo: "true"
          cache-write: "false"

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Build Storybook
        run: bunx turbo run storybook:build --filter=@beep/storybook --summarize

      - name: Run Storybook browser tests
        run: bunx turbo run test:storybook --filter=@beep/storybook

      - name: Prove static artifact
        run: test -f apps/storybook/storybook-static/index.html

      - name: Upload Storybook static artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: storybook-static
          path: apps/storybook/storybook-static
          if-no-files-found: error
