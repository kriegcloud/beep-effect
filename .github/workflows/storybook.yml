name: Storybook

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build And Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM || secrets.TURBO_TEAM }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 100
          persist-credentials: false

      - name: Setup monorepo CI
        uses: ./.github/actions/setup-monorepo-ci
        with:
          cache-turbo: "true"
          cache-write: "false"

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Build Storybook
        run: bunx turbo run storybook:build --filter=@beep/storybook --summarize

      - name: Run Storybook browser tests
        run: bunx turbo run test:storybook --filter=@beep/storybook

      - name: Prove static artifact
        run: test -f apps/storybook/storybook-static/index.html

      - name: Upload Storybook static artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: storybook-static
          path: apps/storybook/storybook-static
          if-no-files-found: error
